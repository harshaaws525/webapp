version: 0.2

env:
  variables:
    REGION: ap-south-1
    PORT: 8080
    ECR_REPO: shop-webapp
    AWS_ACCOUNT_ID: 618060700241
    IMAGE_TAG: latest
    CLUSTER_NAME: shop-webapp-cluster
  exported-variables:
    - IMAGE_TAG


phases:
  install:
    runtime-versions:
      java: corretto21
    commands:
      - echo "Installing Kubernetes"
      - curl -LO "https://dl.k8s.io/release/$(curl -L -s https://dl.k8s.io/release/stable.txt)/bin/linux/amd64/kubectl"
      - chmod +x kubectl
      - mv kubectl /usr/local/bin/
      - echo "kubectl installed successfully"
      
  
  pre_build:
    commands:
      - export IMAGE_TAG=$CODEBUILD_BUILD_NUMBER
      - echo "Running Test for Builds"
      - mvn test
      - echo "Logging into ECR"
      - aws ecr get-login-password --region $REGION | docker login --username AWS --password-stdin $AWS_ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com
      - echo "Connecting to EKS cluster..."
      - aws eks update-kubeconfig --region $REGION --name $CLUSTER_NAME
      - echo "Login Successfull"
  build:
    commands:
       - echo "Build starting"
       - mvn clean package -DskipTests
       - echo "Listing target folder"
       - ls target/
       - echo "Building docker image"
       - docker build -t $ECR_REPO:$IMAGE_TAG .
       - docker tag $ECR_REPO:$IMAGE_TAG $AWS_ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$ECR_REPO:$IMAGE_TAG

  post_build:
    commands:
      - echo "Pushing image"
      - docker push $AWS_ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$ECR_REPO:$IMAGE_TAG
      - echo "Succesfully pushed $ECR_REPO:$IMAGE_TAG to ECR"
      - echo "Deploying to EKS..."
      - kubectl apply -f k8s/
      - echo "Updating image in deployment..."
      - |
        kubectl set image deployment/shop-webapp \
          shop-webapp=$AWS_ACCOUNT_ID.dkr.ecr.$REGION.amazonaws.com/$ECR_REPO:$IMAGE_TAG
      - echo "Waiting for rollout to complete..."
      - kubectl rollout status deployment/shop-webapp
      - echo "Deployment successful!"

cache:
  paths:
    - /root/.m2/**/*
